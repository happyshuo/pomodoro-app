<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="drag-region"></div>

  <div class="container">
    <!-- Timer Section -->
    <div class="timer-section">
      <div class="phase-label" id="phaseLabel">专注</div>
      <div class="timer-ring">
        <svg viewBox="0 0 200 200" class="progress-ring">
          <circle class="progress-bg" cx="100" cy="100" r="88" />
          <circle class="progress-fill" id="progressFill" cx="100" cy="100" r="88"
            stroke-dasharray="553" stroke-dashoffset="0" />
        </svg>
        <div class="timer-display">
          <span id="timerMinutes">25</span><span class="timer-sep">:</span><span id="timerSeconds">00</span>
        </div>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="startBtn">开始</button>
        <button class="btn btn-secondary" id="resetBtn">重置</button>
      </div>
    </div>

    <!-- Current Task Selector -->
    <div class="current-task-section">
      <select id="taskSelector">
        <option value="">-- 选择任务 --</option>
      </select>
      <span class="pomodoro-count" id="pomodoroCount">🍅 0</span>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="tasks">待办</button>
      <button class="tab-btn" data-tab="stats">统计</button>
      <button class="tab-btn" data-tab="chart">图表</button>
    </div>

    <!-- Tasks Panel -->
    <div class="panel active" id="tasksPanel">
      <div class="add-task">
        <input type="text" id="taskInput" placeholder="添加新任务..." />
        <button class="btn btn-small" id="addTaskBtn">+</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>

    <!-- Stats Panel -->
    <div class="panel" id="statsPanel">
      <div class="stats-overview">
        <div class="stat-card">
          <div class="stat-value" id="statTodayPomodoros">0</div>
          <div class="stat-label">今日番茄</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTodayTasks">0</div>
          <div class="stat-label">完成任务</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTodayMinutes">0</div>
          <div class="stat-label">专注分钟</div>
        </div>
      </div>
      <div class="daily-pomos-section">
        <h3 class="section-title">今日进度</h3>
        <div class="daily-pomos-icons" id="dailyPomosIcons"></div>
        <div class="daily-pomos-label" id="dailyPomosLabel"></div>
      </div>
      <h3 class="section-title">历史记录</h3>
      <div class="history-list" id="historyList"></div>
    </div>

    <!-- Chart Panel -->
    <div class="panel" id="chartPanel">
      <div class="chart-filters">
        <button class="chart-filter active" data-period="day">日</button>
        <button class="chart-filter" data-period="week">周</button>
        <button class="chart-filter" data-period="month">月</button>
      </div>
      <div class="chart-container">
        <svg id="chartSvg" viewBox="0 0 420 220" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="chart-summary" id="chartSummary"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
